services:
  # 🐘 PostgreSQL Database Service
  db:
    image: postgres:17
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_USER: sameer
      POSTGRES_PASSWORD: sam129eer
      POSTGRES_DB: auth_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sameer"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🔴 Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🖥️ Adminer (Database UI)
  adminer:
    image: adminer:latest
    container_name: adminer_ui
    restart: always

    ports:
      - "8080:8080"

    depends_on:
      - db

# 📦 Named volumes for persistent storage
volumes:
  postgres_data:
  redis_data: